name: Publish Web Demos

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install fastled CLI system dependencies
        # The fastled 2.0.13 CLI ships a compiled binary that links an embedded
        # webview; without libwebkit2gtk it exits 127 (missing
        # libwebkit2gtk-4.1.so.0) and the build reports "fastled CLI not found".
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-0

      - name: Install FastLED WASM CLI
        run: python -m pip install -r web/requirements.txt

      - name: Test Python PSC validator
        run: python -m unittest web.test_local_server.PscValidationTest

      - name: Test composer codec
        run: node --test web/test_codec.mjs

      - name: Build static site
        run: python web/build_site.py

      - name: Prevent Jekyll processing
        run: touch web/dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
