; ------------------------------------------------------------
; PlatformIO multi-target project:
;  - Seeeduino XIAO (SAMD21 + FastLED)
;  - Teensy 4.1 (SmartMatrix / SmartLED Shield)
; ------------------------------------------------------------

[platformio]
default_envs = seeed_xiao

; ------------------------------------------------------------
; Common environment settings
; ------------------------------------------------------------
[env]
framework = arduino
build_type = debug
monitor_speed = 115200

build_unflags =
    -std=gnu++11
    -frtti
    -fexceptions

build_flags =
    -std=c++17
    -Os
    -ffunction-sections
    -fdata-sections
    -Wall
    -fno-exceptions
    -fno-rtti
    -fno-threadsafe-statics
    -Wno-expansion-to-defined
    -D_HAS_STD_BYTE=0
    -DDEBUG=1

; ------------------------------------------------------------
; Seeeduino XIAO (SAMD21)
; ------------------------------------------------------------
[env:seeed_xiao]
platform = atmelsam
board = seeed_xiao

lib_deps =
    fastled/FastLED@^3.10.0

lib_ignore =
    I2S

build_flags =
    ${env.build_flags}
    -DPOLAR_SHADER_UNIT_TEST=1
    -DXIAO_ENABLED

; Only compile SAMD entry point
build_src_filter =
    +<*>
    -<main_teensy.cpp>
    -<display/SmartMatrixDisplay.cpp>
    -<display/src/SmartMatrixDisplay.cpp>
    +<main_samd.cpp>

; ------------------------------------------------------------
; Seeeduino XIAO (RP2040 common)
; ------------------------------------------------------------
[env:seeed_xiao_rp2040_base]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = seeed_xiao_rp2040
monitor_dtr = 0
monitor_rts = 0

lib_deps =
    fastled/FastLED@^3.10.0

build_flags =
    ${env.build_flags}
    -DPOLAR_SHADER_UNIT_TEST=1
    -DRP2040_ENABLED
    -DPOLAR_SHADER_RP2040_BRIGHTNESS=255
    -DPOLAR_SHADER_RP2040_REFRESH_MS=30
    -DPOLAR_SHADER_RP2040_DUAL_CORE=1

; ------------------------------------------------------------
; Seeeduino XIAO (RP2040 Fabric Display)
; ------------------------------------------------------------
[env:seeed_xiao_rp2040_fabric]
extends = env:seeed_xiao_rp2040_base

build_src_filter =
    +<*>
    -<main_samd.cpp>
    -<main_teensy.cpp>
    -<main_rp2040_round.cpp>
    -<display/SmartMatrixDisplay.cpp>
    -<display/src/SmartMatrixDisplay.cpp>
    +<main_rp2040_fabric.cpp>

; ------------------------------------------------------------
; Seeeduino XIAO (RP2040 Round Display)
; ------------------------------------------------------------
[env:seeed_xiao_rp2040_round]
extends = env:seeed_xiao_rp2040_base

build_flags =
    ${env:seeed_xiao_rp2040_base.build_flags}
    -DPOLAR_SHADER_RP2040_BRIGHTNESS=255
    -DPOLAR_SHADER_RP2040_REFRESH_MS=30
    -DPOLAR_SHADER_RP2040_DUAL_CORE=1

build_src_filter =
    +<*>
    -<main_samd.cpp>
    -<main_teensy.cpp>
    -<main_rp2040_fabric.cpp>
    -<display/SmartMatrixDisplay.cpp>
    -<display/src/SmartMatrixDisplay.cpp>
    +<main_rp2040_round.cpp>

; ------------------------------------------------------------
; Native (Local Desktop)
; ------------------------------------------------------------
[env:native]
platform = native
framework =
build_flags =
    -std=c++17
    -D POLAR_SHADER_UNIT_TEST=1
    -I src
    -fsanitize=thread
    -fPIE
lib_ignore =
    Seeed_Arduino_FreeRTOS
    SoftwareSerial
    FastLED
    SmartMatrix
build_src_filter =
    +<*>
    -<main_samd.cpp>
    -<main_teensy.cpp>
    -<display/SmartMatrixDisplay.cpp>
    -<display/src/SmartMatrixDisplay.cpp>

; ------------------------------------------------------------
; Teensy 4.1 + SmartLED Shield / SmartMatrix
; ------------------------------------------------------------
[env:teensy41_matrix]
platform = teensy
board = teensy41

lib_deps =
    fastled/FastLED@^3.10.0
    pixelmatix/SmartMatrix@^4

upload_protocol = teensy-cli

build_flags =
    ${env.build_flags}
    -DTEENSYDUINO=160
    -DSMARTMATRIX_TEENSY
    -DSMARTMATRIX_ENABLED

; Only compile Teensy entry point
build_src_filter =
    +<*>
    -<main_samd.cpp>
    +<main_teensy.cpp>
    +<display/src/SmartMatrixDisplay.cpp>
