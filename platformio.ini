; ------------------------------------------------------------
; PlatformIO multi-target project:
;  - Seeeduino XIAO (SAMD21 + FastLED)
;  - Teensy 4.1 (SmartMatrix / SmartLED Shield)
; ------------------------------------------------------------

[platformio]
default_envs = seeed_xiao

; ------------------------------------------------------------
; Common environment settings
; ------------------------------------------------------------
[env]
framework = arduino
build_type = debug
monitor_speed = 115200

build_unflags =
    -std=gnu++11
    -frtti
    -fexceptions

build_flags =
    -std=c++17
    -Os
    -ffunction-sections
    -fdata-sections
    -Wall
    -fno-exceptions
    -fno-rtti
    -fno-threadsafe-statics
    -Wno-expansion-to-defined
    -D_HAS_STD_BYTE=0
    -DDEBUG=1

; ------------------------------------------------------------
; Seeeduino XIAO (SAMD21)
; ------------------------------------------------------------
[env:seeed_xiao]
platform = atmelsam
board = seeed_xiao
extra_scripts =
    pre:scripts/generate_psc_playlist.py

lib_deps =
    https://github.com/FastLED/FastLED.git#3.10.4

lib_ignore =
    I2S

build_flags =
    ${env.build_flags}
    -DPOLAR_SHADER_UNIT_TEST=1
    -DXIAO_ENABLED

; Only compile SAMD entry point
build_src_filter =
    +<*>
    -<main_teensy.cpp>
    -<main_rp2040_fabric.cpp>
    -<main_rp2040_fabric32x8.cpp>
    -<main_rp2040_round.cpp>
    -<main_rp2040_fibonacci.cpp>
    -<display/SmartMatrixDisplay.cpp>
    -<display/src/SmartMatrixDisplay.cpp>
    -<tools/pf_snapshot.cpp>
    -<tools/export_pds.cpp>
    -<tools/psc_render.cpp>
    +<main_samd.cpp>

; ------------------------------------------------------------
; Seeeduino XIAO (RP2040 common)
; ------------------------------------------------------------
[env:seeed_xiao_rp2040_base]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = seeed_xiao_rp2040
extra_scripts =
    pre:scripts/generate_psc_playlist.py

lib_deps =
    https://github.com/FastLED/FastLED.git#3.10.4

build_flags =
    ${env.build_flags}
    -DPOLAR_SHADER_UNIT_TEST=1
    -DRP2040_ENABLED
    -DPOLAR_SHADER_RP2040_BRIGHTNESS=255
    -DPOLAR_SHADER_RP2040_REFRESH_MS=30
    -DPOLAR_SHADER_RP2040_DUAL_CORE=1

; ------------------------------------------------------------
; Seeeduino XIAO (RP2040 Fabric Display)
; ------------------------------------------------------------
[env:seeed_xiao_rp2040_fabric]
extends = env:seeed_xiao_rp2040_base

build_flags =
    ${env:seeed_xiao_rp2040_base.build_flags}
    -DPOLAR_SHADER_RP2040_BRIGHTNESS=255
    -DPOLAR_SHADER_RP2040_REFRESH_MS=30

build_src_filter =
    +<*>
    -<main_samd.cpp>
    -<main_teensy.cpp>
    -<main_rp2040_fabric.cpp>
    -<main_rp2040_fabric32x8.cpp>
    -<main_rp2040_round.cpp>
    -<main_rp2040_fibonacci.cpp>
    -<display/SmartMatrixDisplay.cpp>
    -<display/src/SmartMatrixDisplay.cpp>
    -<tools/pf_snapshot.cpp>
    -<tools/export_pds.cpp>
    -<tools/psc_render.cpp>
    +<main_rp2040_fabric.cpp>

; ------------------------------------------------------------
; Seeeduino XIAO (RP2040 Matrix 32x8 Display)
; ------------------------------------------------------------
[env:seeed_xiao_rp2040_matrix32x8]
extends = env:seeed_xiao_rp2040_base

build_flags =
    ${env:seeed_xiao_rp2040_base.build_flags}
    -DPOLAR_SHADER_RP2040_BRIGHTNESS=255
    -DPOLAR_SHADER_RP2040_REFRESH_MS=30

build_src_filter =
    +<*>
    -<main_samd.cpp>
    -<main_teensy.cpp>
    -<main_rp2040_fabric.cpp>
    -<main_rp2040_fabric32x8.cpp>
    -<main_rp2040_round.cpp>
    -<main_rp2040_fibonacci.cpp>
    -<display/SmartMatrixDisplay.cpp>
    -<display/src/SmartMatrixDisplay.cpp>
    -<tools/pf_snapshot.cpp>
    -<tools/export_pds.cpp>
    -<tools/psc_render.cpp>
    +<main_rp2040_fabric32x8.cpp>

; ------------------------------------------------------------
; Seeeduino XIAO (RP2040 Round Display)
; ------------------------------------------------------------
[env:seeed_xiao_rp2040_round]
extends = env:seeed_xiao_rp2040_base

build_flags =
    ${env:seeed_xiao_rp2040_base.build_flags}
    -DPOLAR_SHADER_RP2040_BRIGHTNESS=30
    -DPOLAR_SHADER_RP2040_REFRESH_MS=30

build_src_filter =
    +<*>
    -<main_samd.cpp>
    -<main_teensy.cpp>
    -<main_rp2040_fabric.cpp>
    -<main_rp2040_fabric32x8.cpp>
    -<main_rp2040_round.cpp>
    -<main_rp2040_fibonacci.cpp>
    -<display/SmartMatrixDisplay.cpp>
    -<display/src/SmartMatrixDisplay.cpp>
    -<tools/pf_snapshot.cpp>
    -<tools/export_pds.cpp>
    -<tools/psc_render.cpp>
    +<main_rp2040_round.cpp>

; ------------------------------------------------------------
; Seeeduino XIAO (RP2040 Fibonacci Display)
; ------------------------------------------------------------
[env:seeed_xiao_rp2040_fibonacci]
extends = env:seeed_xiao_rp2040_base

build_flags =
    ${env:seeed_xiao_rp2040_base.build_flags}
    -DPOLAR_SHADER_RP2040_BRIGHTNESS=30
    -DPOLAR_SHADER_RP2040_REFRESH_MS=30

build_src_filter =
    +<*>
    -<main_samd.cpp>
    -<main_teensy.cpp>
    -<main_rp2040_fabric.cpp>
    -<main_rp2040_fabric32x8.cpp>
    -<main_rp2040_round.cpp>
    -<main_rp2040_fibonacci.cpp>
    -<display/SmartMatrixDisplay.cpp>
    -<display/src/SmartMatrixDisplay.cpp>
    -<tools/pf_snapshot.cpp>
    -<tools/export_pds.cpp>
    -<tools/psc_render.cpp>
    +<main_rp2040_fibonacci.cpp>

; ------------------------------------------------------------
; Native (Local Desktop)
; ------------------------------------------------------------
[env:native]
platform = native
framework =
build_flags =
    -std=c++17
    -D POLAR_SHADER_UNIT_TEST=1
    -I src
    -fsanitize=thread
    -fPIE
lib_ignore =
    Seeed_Arduino_FreeRTOS
    SoftwareSerial
    FastLED
    SmartMatrix
build_src_filter =
    +<*>
    -<main_samd.cpp>
    -<main_teensy.cpp>
    -<main_rp2040_fabric.cpp>
    -<main_rp2040_fabric32x8.cpp>
    -<main_rp2040_round.cpp>
    -<main_rp2040_fibonacci.cpp>
    -<display/SmartMatrixDisplay.cpp>
    -<display/src/SmartMatrixDisplay.cpp>
    -<tools/pf_snapshot.cpp>
    -<tools/export_pds.cpp>
    -<tools/psc_render.cpp>
test_ignore = test_composer

; ------------------------------------------------------------
; Native composer — test_composer with test palette table.
; Excludes src/composer/PaletteTable.cpp so the test palette
; impl in test/test_composer/PaletteTable_testimpl.cpp is the
; only definition of paletteById().
; ------------------------------------------------------------
[env:native_composer]
platform = native
framework =
build_flags = ${env:native.build_flags}
lib_ignore = ${env:native.lib_ignore}
build_src_filter =
    +<*>
    -<main_samd.cpp>
    -<main_teensy.cpp>
    -<main_rp2040_fabric.cpp>
    -<main_rp2040_fabric32x8.cpp>
    -<main_rp2040_round.cpp>
    -<main_rp2040_fibonacci.cpp>
    -<display/SmartMatrixDisplay.cpp>
    -<display/src/SmartMatrixDisplay.cpp>
    -<tools/pf_snapshot.cpp>
    -<tools/export_pds.cpp>
    -<tools/psc_render.cpp>
    -<composer/PaletteTable.cpp>
test_build_src = yes
test_filter = test_composer

; ------------------------------------------------------------
; Native PatternFlow snapshot dumper — builds src/tools/pf_snapshot.cpp
; (its own main) into a standalone program that writes PGM/PPM proofs to
; build/pf_snapshots/. This is the ONLY env that includes pf_snapshot.cpp;
; every other env excludes it so no second main() is ever linked.
; Run: pio run -e native_pf_snapshot && .pio/build/native_pf_snapshot/program
; ------------------------------------------------------------
[env:native_pf_snapshot]
platform = native
framework =
build_flags =
    -std=c++17
    -D POLAR_SHADER_UNIT_TEST=1
    -I src
lib_ignore = ${env:native.lib_ignore}
build_src_filter =
    +<*>
    -<main_samd.cpp>
    -<main_teensy.cpp>
    -<main_rp2040_fabric.cpp>
    -<main_rp2040_fabric32x8.cpp>
    -<main_rp2040_round.cpp>
    -<main_rp2040_fibonacci.cpp>
    -<display/SmartMatrixDisplay.cpp>
    -<display/src/SmartMatrixDisplay.cpp>
    +<tools/pf_snapshot.cpp>
    -<tools/export_pds.cpp>
    -<tools/psc_render.cpp>

; ------------------------------------------------------------
; Native .PDS exporter — builds src/tools/export_pds.cpp (its own main) into a
; standalone program that writes displays/*.pds for every built-in spec. This
; is the ONLY env that includes export_pds.cpp; every other env excludes it so
; no second main() is ever linked.
; Run: pio run -e native_export_pds && .pio/build/native_export_pds/program
; ------------------------------------------------------------
[env:native_export_pds]
platform = native
framework =
build_flags =
    -std=c++17
    -D POLAR_SHADER_UNIT_TEST=1
    -I src
lib_ignore = ${env:native.lib_ignore}
build_src_filter =
    +<*>
    -<main_samd.cpp>
    -<main_teensy.cpp>
    -<main_rp2040_fabric.cpp>
    -<main_rp2040_fabric32x8.cpp>
    -<main_rp2040_round.cpp>
    -<main_rp2040_fibonacci.cpp>
    -<display/SmartMatrixDisplay.cpp>
    -<display/src/SmartMatrixDisplay.cpp>
    -<tools/pf_snapshot.cpp>
    +<tools/export_pds.cpp>
    -<tools/psc_render.cpp>

; ------------------------------------------------------------
; Native .PSC → frames exporter — builds src/tools/psc_render.cpp (its own
; main) into a headless renderer that samples a composition through the REAL
; C++ pipeline and writes geometry.csv + frames.bin + meta.json for the GIF
; assembler (scripts/render_gif.py). This is the ONLY env that includes
; psc_render.cpp; every other env excludes it so no second main() links.
; It defines POLAR_SHADER_REAL_NOISE so inoise16 uses the vendored FastLED
; 3.10.4 implementation (src/tools/thirdparty/RealNoise16.cpp) for hardware-
; accurate noise, and keeps the real palette table (composer/PaletteTable.cpp).
; Run: pio run -e native_psc_render && \
;   .pio/build/native_psc_render/program tools/gif/hero.psc displays/fibonacci.pds build/gif/
; ------------------------------------------------------------
[env:native_psc_render]
platform = native
framework =
build_flags =
    -std=c++17
    -D POLAR_SHADER_UNIT_TEST=1
    -D POLAR_SHADER_REAL_NOISE
    -I src
lib_ignore = ${env:native.lib_ignore}
build_src_filter =
    +<*>
    -<main_samd.cpp>
    -<main_teensy.cpp>
    -<main_rp2040_fabric.cpp>
    -<main_rp2040_fabric32x8.cpp>
    -<main_rp2040_round.cpp>
    -<main_rp2040_fibonacci.cpp>
    -<display/SmartMatrixDisplay.cpp>
    -<display/src/SmartMatrixDisplay.cpp>
    -<tools/pf_snapshot.cpp>
    -<tools/export_pds.cpp>
    +<tools/psc_render.cpp>

; ------------------------------------------------------------
; Teensy 4.1 + SmartLED Shield / SmartMatrix
; ------------------------------------------------------------
[env:teensy41_matrix]
platform = teensy
board = teensy41
extra_scripts =
    pre:scripts/generate_psc_playlist.py

lib_deps =
    https://github.com/FastLED/FastLED.git#3.10.4
    pixelmatix/SmartMatrix@^4

; Avoid PlatformIO's default teensy-cli upload flow, which triggers a separate
; teensy_reboot step before teensy_loader_cli and can race USB re-enumeration.
upload_protocol = custom
upload_command = "$PROJECT_PACKAGES_DIR/tool-teensy/teensy_loader_cli" -mmcu=$BOARD_MCU -w -s -v $SOURCE

build_flags =
    ${env.build_flags}
    -DTEENSYDUINO=160
    -DSMARTMATRIX_TEENSY
    -DSMARTMATRIX_ENABLED

; Only compile Teensy entry point
build_src_filter =
    +<*>
    -<main_samd.cpp>
    -<main_rp2040_fabric.cpp>
    -<main_rp2040_fabric32x8.cpp>
    -<main_rp2040_round.cpp>
    -<main_rp2040_fibonacci.cpp>
    -<tools/pf_snapshot.cpp>
    -<tools/export_pds.cpp>
    -<tools/psc_render.cpp>
    +<main_teensy.cpp>
    +<display/src/SmartMatrixDisplay.cpp>
